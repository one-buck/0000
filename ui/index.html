<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- ── Global toast (always present) ── -->
  <div id="partial-toast"></div>

  <!-- ── Auth overlays (login / verify / profile / call) ── -->
  <div id="partial-overlays"></div>

  <!-- ── Main layout (hidden until login) ── -->
  <div class="main-layout hidden" id="main-layout">
    <div id="partial-sidebar"></div>

    <main class="panel" id="panel">
      <div id="partial-view-empty"></div>
      <div id="partial-view-chat"></div>
      <div id="partial-view-new-chat"></div>
      <div id="partial-view-group"></div>
      <div id="partial-view-info"></div>
      <div id="partial-view-settings"></div>
      <div id="partial-view-profile-edit"></div>
      <div id="partial-view-blocked"></div>
    </main>
  </div>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="loader.js"></script>
</body>
</html>
