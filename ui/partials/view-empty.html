<!-- ═══════════════════════════════════════════
     VIEW: EMPTY STATE
     Default panel shown when no chat is open.
     Activated by: showView('view-empty')
     ═══════════════════════════════════════════ -->
<div class="panel-view active" id="view-empty">
  <div class="empty-state">
    <i data-lucide="message-square-dashed" style="width:64px;height:64px;stroke:#d4d4d4;fill:none;stroke-width:1;"></i>
    <div class="empty-state-title">No conversation selected</div>
    <div class="empty-state-sub">Choose a chat from the list or start a new one</div>
  </div>
</div>
