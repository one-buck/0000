<!-- ═══════════════════════════════════════════
     TOAST NOTIFICATION
     Floats bottom-right. Shown/hidden via JS:
       showToast(contactObject, messageString)
     IDs used by app.js:
       #toast, #toast-avatar-el, #toast-name-el, #toast-msg-el
     ═══════════════════════════════════════════ -->
<div class="toast" id="toast">
  <div class="avatar-wrap">
    <div class="avatar avatar-32" id="toast-avatar-el"></div>
  </div>
  <div class="toast-body">
    <div class="toast-name" id="toast-name-el">Alice Morgan</div>
    <div class="toast-msg"  id="toast-msg-el">Hey, are you free later?</div>
  </div>
</div>
